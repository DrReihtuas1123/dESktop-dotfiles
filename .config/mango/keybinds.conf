# ======================
#      KEYBINDS
# ======================

# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=SUPER,space,spawn,wofi --show drun 
bind=SUPER,Return,spawn,kitty

bind=SUPER,f,spawn,firefox # firefox
bind=SUPER+SHIFT,d,spawn,hyprlock
bind=SUPER+SHIFT,s,spawn_shell,systemctl suspend # suspend
bind=SUPER,p,spawn,pcmanfm
bind=SUPER,c,spawn,free42
bind=SUPER,b,spawn,zen
bind=SUPER,v,spawn,zathura

# screenshot
bind=NONE,Print,spawn,sway-interactive-screenshot -s region --save-dir ~/Pictures/Screenshots/

# exit
bind=SUPER+CTRL+SHIFT,e,quit
bind=SUPER,q,killclient,

# switch window focus
bind=ALT,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# switch window status
#bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=ALT,space,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
#bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,c,set_proportion,0.75
bind=ALT,y,set_proportion,0.5
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout
bind=SUPER,s,setlayout,scroller
bind=SUPER,t,setlayout,tile
bind=SUPER,g,setlayout,grid
bind=SUPER,m,setlayout,monocle

# master ?
bind=ALT,i,incnmaster,+1
bind=ALT,u,incnmaster,-1

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9

bind=SUPER+SHIFT,1,tagsilent,1
bind=SUPER+SHIFT,2,tagsilent,2
bind=SUPER+SHIFT,3,tagsilent,3
bind=SUPER+SHIFT,4,tagsilent,4
bind=SUPER+SHIFT,5,tagsilent,5
bind=SUPER+SHIFT,6,tagsilent,6
bind=SUPER+SHIFT,7,tagsilent,7
bind=SUPER+SHIFT,8,tagsilent,8
bind=SUPER+SHIFT,9,tagsilent,9

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
# bind=Alt,1,tag,1,0
# bind=Alt,2,tag,2,0
# bind=Alt,3,tag,3,0
# bind=Alt,4,tag,4,0
# bind=Alt,5,tag,5,0
# bind=Alt,6,tag,6,0
# bind=Alt,7,tag,7,0
# bind=Alt,8,tag,8,0
# bind=Alt,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=ALT+SHIFT,k,resizewin,+0,-50
bind=ALT+SHIFT,j,resizewin,+0,+50
bind=ALT+SHIFT,h,resizewin,-50,+0
bind=ALT+SHIFT,l,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,1
mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Laptop keys
bind=NONE,XF86AudioRaiseVolume, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute, spawn, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute, spawn, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp, spawn, brightnessctl s 10%+
bind=NONE,XF86MonBrightnessDown, spawn, brightnessctl s 10%-

# playing music
bind=NONE,XF86AudioNext, spawn, playerctl next
bind=NONE,XF86AudioPause, spawn, playerctl play-pause
bind=NONE,XF86AudioPlay, spawn, playerctl play-pause
bind=NONE,XF86AudioPrev, spawn, playerctl previous


# Monitors 
bind=Alt,h,focusmon,left
bind=Alt,l,focusmon,right
